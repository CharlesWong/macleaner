name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: build · test · lint (macOS arm64)
    runs-on: macos-14
    steps:
      # Third-party actions are pinned to a full commit SHA (supply-chain
      # hardening); the trailing comment records the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: x86_64-apple-darwin # so we can cross-check the Intel slice

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Release build (native arm64)
        run: cargo build --release --workspace --locked

      - name: Cross-build the Intel slice (catch x86_64 breakage at PR time)
        run: cargo build --release --workspace --locked --target x86_64-apple-darwin
